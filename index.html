<style>
  :root{
    --sky-top:#6fa3c4; --sky-mid:#a9cbd4; --sky-bottom:#ece4d4;
    --ink:#3a3f3d; --soft:rgba(58,63,61,.62); --faint:rgba(58,63,61,.38);
    --orb:#fdf1cf; --orb-glow:rgba(253,241,207,.6); --horizon-glow:rgba(255,244,214,.4);
    --line:rgba(58,63,61,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Karla',system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bottom) 100%);
    overflow:hidden;
    transition:background 3s ease, color 3s ease;
  }
  #grain{position:fixed;inset:-10%;pointer-events:none;z-index:5;opacity:.05;mix-blend-mode:overlay}
  #horizon{
    position:fixed;left:0;right:0;bottom:20vh;height:40vh;pointer-events:none;z-index:1;
    background:radial-gradient(ellipse 70% 100% at 50% 100%, var(--horizon-glow), transparent 70%);
    transition:background 3s ease;
  }
  #stars{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 4s ease}
  .star{position:absolute;border-radius:50%;background:#efe6d8;animation:twinkle 5s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.9}}
  #orb{
    position:fixed;width:72px;height:72px;border-radius:50%;
    background:var(--orb);
    box-shadow:0 0 70px 28px var(--orb-glow);
    transition:background 3s ease, box-shadow 3s ease, left 60s linear, top 60s linear;
    pointer-events:none;
  }
  #orb .crescent{
    position:absolute;inset:0;border-radius:50%;
    opacity:0;transition:opacity 3s ease;
    box-shadow:inset 14px -6px 0 0 rgba(60,58,88,.45);
  }
  body.night #orb .crescent{opacity:1}
  #rays{
    position:absolute;top:50%;left:50%;width:340px;height:340px;
    transform:translate(-50%,-50%);pointer-events:none;
    opacity:0;transition:opacity 3s ease;
    animation:rotate 240s linear infinite;
  }
  body.day #rays, body.dawn #rays{opacity:.55}
  body.dusk #rays{opacity:.35}
  #rays::before{
    content:'';position:absolute;inset:0;
    background:repeating-conic-gradient(var(--orb-glow) 0deg 3deg, transparent 3deg 18deg);
    border-radius:50%;
    mask:radial-gradient(circle, transparent 30%, black 42%, transparent 68%);
    -webkit-mask:radial-gradient(circle, transparent 30%, black 42%, transparent 68%);
  }
  @keyframes rotate{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
  .cloud{
    position:fixed;border-radius:50%;background:rgba(255,255,255,.5);
    filter:blur(26px);pointer-events:none;animation:drift linear infinite;
    transition:background 3s ease;
  }
  body.night .cloud{background:rgba(210,205,230,.10)}
  body.dusk .cloud{background:rgba(255,240,228,.30)}
  @keyframes drift{from{transform:translateX(-30vw)}to{transform:translateX(130vw)}}
  #hills{position:fixed;left:0;right:0;bottom:0;width:100%;height:38vh;pointer-events:none;z-index:2}
  #hills path,#hills g{transition:fill 3s ease, opacity 3s ease}
  main{
    position:relative;z-index:2;height:100%;
    display:grid;grid-template-columns:1.2fr 1fr;grid-template-rows:auto 1fr;
    padding:6vh 6vw 22vh;gap:2rem 4rem;
  }
  .datebrow{
    font-size:.85rem;letter-spacing:.28em;text-transform:uppercase;
    color:var(--soft);margin-bottom:.9rem;font-weight:500;
    position:relative;padding-bottom:1rem;
  }
  .datebrow::after{content:'';position:absolute;left:0;bottom:0;width:2.5rem;height:1px;background:var(--ink);opacity:.35}
  #clock{
    font-family:'Fraunces',Georgia,serif;font-weight:300;
    font-size:clamp(4.5rem,11vw,9rem);line-height:1;letter-spacing:-.02em;
    text-shadow:0 2px 24px rgba(0,0,0,.08);
  }
  #clock .ampm{font-size:.26em;font-style:italic;font-weight:400;letter-spacing:.04em;margin-left:.3em;color:var(--soft)}
  #weather{justify-self:end;text-align:right;padding-top:.8rem}
  #temp{font-family:'Fraunces',Georgia,serif;font-weight:300;font-size:clamp(2.2rem,4.5vw,3.4rem);line-height:1}
  #wdesc{color:var(--soft);margin-top:.35rem;font-size:.95rem}
  #wrange{color:var(--faint);margin-top:.15rem;font-size:.85rem}
  section h2{font-size:.8rem;letter-spacing:.28em;text-transform:uppercase;font-weight:500;color:var(--soft);margin-bottom:1.1rem}
  #events{align-self:start;margin-top:1rem}
  .event{display:flex;gap:1.2rem;padding:.55rem 0;align-items:baseline}
  .event + .event{border-top:1px solid var(--line)}
  .event .t{font-family:'Fraunces',Georgia,serif;font-size:1.05rem;min-width:5.2rem;color:var(--soft)}
  .event .n{font-size:1.12rem;font-weight:300;flex:1}
  .event .del{opacity:0;cursor:pointer;color:var(--faint);font-size:.85rem;transition:opacity .2s}
  .event:hover .del{opacity:1}
  .empty{color:var(--faint);font-style:italic;font-weight:300}
  #tasks{align-self:start;justify-self:end;text-align:right;margin-top:1rem;max-width:26rem}
  .task{font-size:1.05rem;font-weight:300;padding:.5rem 0;display:flex;justify-content:flex-end;align-items:baseline;gap:.6rem}
  .task + .task{border-top:1px solid var(--line)}
  .task .del{opacity:0;cursor:pointer;color:var(--faint);font-size:.85rem;transition:opacity .2s}
  .task:hover .del{opacity:1}
  footer{
    position:fixed;left:0;right:0;bottom:4.5vh;z-index:3;
    text-align:center;font-family:'Fraunces',Georgia,serif;
    font-size:1.05rem;font-weight:300;font-style:italic;color:var(--soft);padding:0 8vw;
  }
  /* edit affordance + panel */
  #editToggle{
    position:fixed;bottom:1.2rem;right:1.2rem;z-index:20;
    width:2.6rem;height:2.6rem;border-radius:50%;
    background:rgba(255,255,255,.25);border:1px solid var(--line);
    color:var(--ink);font-size:1.1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    opacity:.45;transition:opacity .2s, background .2s;
  }
  #editToggle:hover{opacity:1;background:rgba(255,255,255,.5)}
  #editPanel{
    position:fixed;bottom:4.2rem;right:1.2rem;z-index:21;
    width:min(90vw, 340px);max-height:70vh;overflow-y:auto;
    background:rgba(255,255,255,.92);color:#333;border-radius:14px;
    box-shadow:0 10px 40px rgba(0,0,0,.25);padding:1.2rem;
    font-family:'Karla',sans-serif;display:none;
  }
  #editPanel.open{display:block}
  #editPanel h3{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:#777;margin:1rem 0 .5rem}
  #editPanel h3:first-child{margin-top:0}
  #editPanel input{
    width:100%;padding:.5rem .6rem;border:1px solid #ddd;border-radius:8px;
    font-family:'Karla',sans-serif;font-size:.92rem;margin-bottom:.4rem;
  }
  #editPanel button.add{
    width:100%;padding:.5rem;border:none;border-radius:8px;background:#4a5a4a;
    color:#fff;font-size:.85rem;cursor:pointer;margin-top:.2rem;
  }
  #editPanel .row{display:flex;gap:.4rem}
  #editPanel .row input:first-child{flex:0 0 5.5rem}
  #authRow{border-top:1px solid #eee;margin-top:1rem;padding-top:.8rem;font-size:.8rem;color:#666}
  #authRow button{
    background:#fff;border:1px solid #ccc;border-radius:8px;padding:.4rem .7rem;
    cursor:pointer;font-size:.8rem;margin-top:.4rem;
  }
  #syncNote{font-size:.72rem;color:#999;margin-top:.6rem;line-height:1.4}
  #skyswitch{position:fixed;bottom:1rem;left:1rem;z-index:9;display:none;gap:.4rem}
  body.demo #skyswitch{display:flex}
  #skyswitch button{
    border:1px solid var(--line);background:rgba(255,255,255,.25);
    color:var(--ink);font-family:'Karla',sans-serif;font-size:.72rem;
    letter-spacing:.08em;padding:.35rem .7rem;border-radius:99px;cursor:pointer;
  }
  #skyswitch button:hover{background:rgba(255,255,255,.5)}
  @media (max-width:820px){
    main{grid-template-columns:1fr;padding:5vh 8vw 26vh;gap:1.6rem;overflow-y:auto}
    #weather{justify-self:start;text-align:left;padding-top:0}
    #tasks{justify-self:start;text-align:left}
    .task{justify-content:flex-start}
  }
  @media (prefers-reduced-motion:reduce){.cloud,.star{animation:none}}
</style>
</head>

    <path d="M95,262 l7,-18 l7,18 z M110,262 l6,-14 l6,14 z M124,262 l5,-11 l5,11 z"/>
    <path d="M330,238 l8,-21 l8,21 z M348,238 l6,-15 l6,15 z"/>

    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#noise)"/>

<main>
  <div>
    <div class="datebrow" id="date"></div>
    <div id="clock"></div>
  </div>
  <div id="weather">
    <div id="temp">&mdash;</div>
    <div id="wdesc"></div>
    <div id="wrange"></div>
  </div>
  <section id="events">
    <h2>Today</h2>
    <div id="eventlist"></div>
  </section>
  <section id="tasks">
    <h2>On your mind</h2>
    <div id="tasklist"></div>
  </section>
</main>

<footer id="whatmatters"></footer>

<div id="skyswitch" aria-label="Preview time of day">
  <button data-sky="dawn">dawn</button>
  <button data-sky="day">day</button>
  <button data-sky="dusk">dusk</button>
  <button data-sky="night">night</button>
</div>

<button id="editToggle" title="Edit today">&#9998;</button>
<div id="editPanel">
  <h3>Add event (today)</h3>
  <div class="row">
    <input type="time" id="newEventTime">
    <input type="text" id="newEventTitle" placeholder="What's happening">
  </div>
  <button class="add" id="addEventBtn">Add event</button>

  <h3>Add task</h3>
  <input type="text" id="newTaskTitle" placeholder="What's on your mind">
  <button class="add" id="addTaskBtn">Add task</button>

  <div id="authRow">
    <div id="authStatus">Not signed in — changes stay on this device only.</div>
    <button id="signInBtn">Sign in with Google</button>
    <button id="signOutBtn" style="display:none">Sign out</button>
    <div id="syncNote">Sign in with the same Google account on every device (PC and iPad) so they see the same tasks and events.</div>
  </div>
</div>

<script>
/* ============================================================
   FIREBASE CONFIG — paste your project's config here.
   Same project as your other tools is fine; just add this
   page's github.io URL under Authentication > Settings >
   Authorized domains.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCjTtCmdY57CaFolPP7OwzlzCkqtDZu6Zo",
  authDomain: "emergency-hub-b19b2.firebaseapp.com",
  projectId: "emergency-hub-b19b2",
  storageBucket: "emergency-hub-b19b2.firebasestorage.app",
  messagingSenderId: "274616015312",
  appId: "1:274616015312:web:c643ed312dea18cc0201d5"
};

let db = null, auth = null, currentUser = null;
let firebaseReady = false;

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  auth = firebase.auth();
  firebaseReady = true;
} catch (err) {
  console.warn("Firebase not configured yet — running in local/demo mode.", err);
}

/* ---------- weather (Maynardville, TN by default) ---------- */
const LAT = 36.2564;
const LON = -83.8046;
const WEATHER_CODES = {
  0:"Clear",1:"Mostly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",48:"Foggy",
  51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",
  66:"Freezing rain",67:"Freezing rain",71:"Light snow",73:"Snow",75:"Heavy snow",77:"Snow grains",
  80:"Light showers",81:"Showers",82:"Heavy showers",85:"Snow showers",86:"Snow showers",
  95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"
};

async function fetchWeather(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min` +
      `&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`;
    const res = await fetch(url);
    const data = await res.json();
    return {
      temp: data.current?.temperature_2m,
      desc: WEATHER_CODES[data.current?.weather_code] || "",
      hi: data.daily?.temperature_2m_max?.[0],
      lo: data.daily?.temperature_2m_min?.[0]
    };
  }catch(err){
    return {temp:null, desc:"", hi:null, lo:null};
  }
}

/* ============================================================
   SKIES
   ============================================================ */
const SKIES = {
  dawn: { top:"#7d6d92", mid:"#c9a3a0", bottom:"#f2ddc1", ink:"#4a3d3c",
    ridgeFar:"#b3a3ae", ridgeMid:"#8d7f8c", ridgeNear:"#5c5548", tree:"#3f3a2f", hillNear:"#332f26",
    hazeFar:.6, hazeMid:.8, orb:"#f7e3c4", glow:"rgba(247,227,196,.65)", horizon:"rgba(247,199,163,.55)", stars:.1 },
  day: { top:"#6fa3c4", mid:"#a9cbd4", bottom:"#ece4d4", ink:"#3a3f3d",
    ridgeFar:"#a9b8c2", ridgeMid:"#7f9891", ridgeNear:"#4a5f4c", tree:"#354533", hillNear:"#2e3b2c",
    hazeFar:.55, hazeMid:.78, orb:"#fdf1cf", glow:"rgba(253,241,207,.6)", horizon:"rgba(255,244,214,.4)", stars:0 },
  dusk: { top:"#4c3f6b", mid:"#8d6d8c", bottom:"#e6a97e", ink:"#3a2f40",
    ridgeFar:"#9a8296", ridgeMid:"#6b5668", ridgeNear:"#3c3340", tree:"#241f2c", hillNear:"#1e1926",
    hazeFar:.5, hazeMid:.75, orb:"#f2a05e", glow:"rgba(242,160,94,.55)", horizon:"rgba(240,140,110,.55)", stars:.5 },
  night: { top:"#0f0f21", mid:"#2b2846", bottom:"#4a3f5e", ink:"#ece3d6",
    ridgeFar:"#463f60", ridgeMid:"#2c273f", ridgeNear:"#161328", tree:"#0c0a1a", hillNear:"#080713",
    hazeFar:.4, hazeMid:.7, orb:"#e9e2d2", glow:"rgba(233,226,210,.3)", horizon:"rgba(140,130,190,.25)", stars:1 }
};

function skyFor(h){
  if (h>=5 && h<8) return "dawn";
  if (h>=8 && h<18) return "day";
  if (h>=18 && h<21) return "dusk";
  return "night";
}
let forcedSky = null;
function hexAlpha(hex,a){ return hex+a; }

function paintSky(){
  const now = new Date();
  const name = forcedSky || skyFor(now.getHours());
  const s = SKIES[name];
  const r = document.documentElement.style;
  r.setProperty("--sky-top", s.top);
  r.setProperty("--sky-mid", s.mid);
  r.setProperty("--sky-bottom", s.bottom);
  r.setProperty("--horizon-glow", s.horizon);
  r.setProperty("--ink", s.ink);
  r.setProperty("--soft", hexAlpha(s.ink,"aa"));
  r.setProperty("--faint", hexAlpha(s.ink,"66"));
  r.setProperty("--line", hexAlpha(s.ink,"2e"));
  r.setProperty("--orb", s.orb);
  r.setProperty("--orb-glow", s.glow);
  document.getElementById("ridgeFar").setAttribute("fill", s.ridgeFar);
  document.getElementById("ridgeFar").setAttribute("opacity", s.hazeFar);
  document.getElementById("ridgeMid").setAttribute("fill", s.ridgeMid);
  document.getElementById("ridgeMid").setAttribute("opacity", s.hazeMid);
  document.getElementById("ridgeNear").setAttribute("fill", s.ridgeNear);
  document.getElementById("treeline").setAttribute("fill", s.tree);
  document.getElementById("hillNear").setAttribute("fill", s.hillNear);
  document.getElementById("stars").style.opacity = s.stars;
  document.body.classList.toggle("night", name==="night");
  document.body.classList.toggle("dusk", name==="dusk");
  placeOrb(name, now);
}

function placeOrb(name, now){
  const h = forcedSky ? {dawn:6.5, day:12, dusk:19, night:23.5}[forcedSky]
                      : now.getHours() + now.getMinutes()/60;
  let frac;
  if (h>=6 && h<20) frac = (h-6)/14;
  else frac = ((h>=20 ? h-20 : h+4)/10);
  const x = 8 + frac*84;
  const y = 8 + (1 - Math.sin(frac*Math.PI))*30;
  const orb = document.getElementById("orb");
  orb.style.left = x+"vw";
  orb.style.top = y+"vh";
}

(function makeStars(){
  const wrap = document.getElementById("stars");
  for (let i=0;i<70;i++){
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*2+1;
    s.style.width = s.style.height = size+"px";
    s.style.left = Math.random()*100+"vw";
    s.style.top = Math.random()*55+"vh";
    s.style.animationDelay = (Math.random()*5)+"s";
    wrap.appendChild(s);
  }
})();

(function makeClouds(){
  const specs = [
    {w:340,h:90,top:"12vh",dur:220,delay:-60},
    {w:260,h:70,top:"22vh",dur:300,delay:-180},
    {w:420,h:100,top:"6vh",dur:260,delay:-120}
  ];
  specs.forEach(c=>{
    const d = document.createElement("div");
    d.className = "cloud";
    d.style.width = c.w+"px"; d.style.height = c.h+"px"; d.style.top = c.top;
    d.style.animationDuration = c.dur+"s";
    d.style.animationDelay = c.delay+"s";
    document.body.appendChild(d);
  });
})();

function tick(){
  const n = new Date();
  let h = n.getHours(), m = n.getMinutes();
  const ampm = h>=12 ? "pm" : "am";
  h = h % 12 || 12;
  document.getElementById("clock").innerHTML =
    h+":"+String(m).padStart(2,"0")+"<span class=\'ampm\'>"+ampm+"</span>";
  document.getElementById("date").textContent =
    n.toLocaleDateString(undefined,{weekday:"long", month:"long", day:"numeric"});
}

/* ---------- data: Firestore-backed, with local fallback ---------- */
const DEMO_EVENTS = [
  {id:"demo1", time:"09:30", title:"Coffee with Hameed"},
  {id:"demo2", time:"13:00", title:"Bia - vet checkup"},
  {id:"demo3", time:"18:45", title:"Leave for night shift"}
];
const DEMO_TASKS = [
  {id:"t1", title:"Refill prescriptions"},
  {id:"t2", title:"Package EchoPop order"},
  {id:"t3", title:"Water the porch plants"}
];

let localEvents = JSON.parse(JSON.stringify(DEMO_EVENTS));
let localTasks = JSON.parse(JSON.stringify(DEMO_TASKS));
let unsubEvents = null, unsubTasks = null;

function todayStr(){
  const n = new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function fmtTime(t24){
  if (!t24) return "";
  const [hh,mm] = t24.split(":").map(Number);
  const ampm = hh>=12 ? "PM" : "AM";
  const h12 = hh%12 || 12;
  return h12+":"+String(mm).padStart(2,"0")+" "+ampm;
}

function renderEvents(list){
  const ev = document.getElementById("eventlist");
  ev.innerHTML = "";
  const sorted = [...list].sort((a,b)=> (a.time||"").localeCompare(b.time||""));
  if (!sorted.length){
    ev.innerHTML = "<div class=\'empty\'>Nothing scheduled - the day is yours.</div>";
    return;
  }
  sorted.forEach(e=>{
    const row = document.createElement("div");
    row.className = "event";
    row.innerHTML = `<div class="t">${fmtTime(e.time)}</div><div class="n">${e.title}</div><div class="del" data-id="${e.id}">remove</div>`;
    row.querySelector(".del").addEventListener("click", ()=> deleteEvent(e.id));
    ev.appendChild(row);
  });
}

function renderTasks(list){
  const tl = document.getElementById("tasklist");
  tl.innerHTML = "";
  list.slice(0,8).forEach(t=>{
    const row = document.createElement("div");
    row.className = "task";
    row.innerHTML = `<div class="del" data-id="${t.id}">remove</div><div>${t.title}</div>`;
    row.querySelector(".del").addEventListener("click", ()=> deleteTask(t.id));
    tl.appendChild(row);
  });
}

function startLocalMode(){
  renderEvents(localEvents.filter(e => !e.date || e.date === todayStr()));
  renderTasks(localTasks);
}

function startFirestoreListeners(uid){
  if (unsubEvents) unsubEvents();
  if (unsubTasks) unsubTasks();
  const today = todayStr();
  unsubEvents = db.collection("users").doc(uid).collection("events")
    .where("date","==",today)
    .onSnapshot(snap=>{
      const list = [];
      snap.forEach(doc=> list.push({id:doc.id, ...doc.data()}));
      renderEvents(list);
    }, err=>{ console.warn("events listener error", err); });
  unsubTasks = db.collection("users").doc(uid).collection("tasks")
    .orderBy("createdAt","asc")
    .onSnapshot(snap=>{
      const list = [];
      snap.forEach(doc=> list.push({id:doc.id, ...doc.data()}));
      renderTasks(list);
    }, err=>{ console.warn("tasks listener error", err); });
}

function addEvent(time, title){
  if (!title) return;
  if (currentUser){
    db.collection("users").doc(currentUser.uid).collection("events").add({
      time, title, date: todayStr(), createdAt: Date.now()
    });
  } else {
    localEvents.push({id:"local-"+Date.now(), time, title, date: todayStr()});
    startLocalMode();
  }
}
function deleteEvent(id){
  if (currentUser){
    db.collection("users").doc(currentUser.uid).collection("events").doc(id).delete();
  } else {
    localEvents = localEvents.filter(e=>e.id!==id);
    startLocalMode();
  }
}
function addTask(title){
  if (!title) return;
  if (currentUser){
    db.collection("users").doc(currentUser.uid).collection("tasks").add({
      title, createdAt: Date.now()
    });
  } else {
    localTasks.push({id:"local-"+Date.now(), title});
    startLocalMode();
  }
}
function deleteTask(id){
  if (currentUser){
    db.collection("users").doc(currentUser.uid).collection("tasks").doc(id).delete();
  } else {
    localTasks = localTasks.filter(t=>t.id!==id);
    startLocalMode();
  }
}

/* ---------- auth ---------- */
function updateAuthUI(){
  const status = document.getElementById("authStatus");
  const inBtn = document.getElementById("signInBtn");
  const outBtn = document.getElementById("signOutBtn");
  if (currentUser){
    status.textContent = "Signed in as " + (currentUser.displayName || currentUser.email) + " - syncing across devices.";
    inBtn.style.display = "none";
    outBtn.style.display = "inline-block";
  } else {
    status.textContent = "Not signed in - changes stay on this device only.";
    inBtn.style.display = "inline-block";
    outBtn.style.display = "none";
  }
}

if (firebaseReady){
  auth.onAuthStateChanged(user=>{
    currentUser = user;
    updateAuthUI();
    if (user){
      document.body.classList.remove("demo");
      startFirestoreListeners(user.uid);
    } else {
      startLocalMode();
    }
  });
  document.getElementById("signInBtn").addEventListener("click", ()=>{
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err=> alert("Sign-in error: "+err.message));
  });
  document.getElementById("signOutBtn").addEventListener("click", ()=> auth.signOut());
} else {
  document.body.classList.add("demo");
  document.getElementById("authStatus").textContent = "Firebase isn\'t configured yet - running in demo mode.";
  document.getElementById("signInBtn").style.display = "none";
  startLocalMode();
}

/* ---------- edit panel wiring ---------- */
document.getElementById("editToggle").addEventListener("click", ()=>{
  document.getElementById("editPanel").classList.toggle("open");
});
document.getElementById("addEventBtn").addEventListener("click", ()=>{
  const t = document.getElementById("newEventTime").value;
  const title = document.getElementById("newEventTitle").value.trim();
  if (!title) return;
  addEvent(t, title);
  document.getElementById("newEventTitle").value = "";
});
document.getElementById("addTaskBtn").addEventListener("click", ()=>{
  const title = document.getElementById("newTaskTitle").value.trim();
  if (!title) return;
  addTask(title);
  document.getElementById("newTaskTitle").value = "";
});

/* demo sky switcher (only visible without Firebase configured) */
document.getElementById("skyswitch").addEventListener("click", e=>{
  if (e.target.dataset.sky){ forcedSky = e.target.dataset.sky; paintSky(); }
});

/* ---------- run ---------- */
tick(); paintSky();
fetchWeather().then(w=>{
  if (w.temp != null){
    document.getElementById("temp").textContent = Math.round(w.temp) + "\u00b0";
    document.getElementById("wdesc").textContent = w.desc || "";
    document.getElementById("wrange").textContent =
      (w.hi != null) ? ("H " + Math.round(w.hi) + "\u00b0  \u00b7  L " + Math.round(w.lo) + "\u00b0") : "";
  }
});
setInterval(tick, 1000);
setInterval(paintSky, 60*1000);
setInterval(()=>{ fetchWeather().then(w=>{
  if (w.temp != null){
    document.getElementById("temp").textContent = Math.round(w.temp) + "\u00b0";
    document.getElementById("wdesc").textContent = w.desc || "";
    document.getElementById("wrange").textContent =
      (w.hi != null) ? ("H " + Math.round(w.hi) + "\u00b0  \u00b7  L " + Math.round(w.lo) + "\u00b0") : "";
  }
});}, 10*60*1000);
</script>
</body>
</html>
